{% extends "pages/base_app.html" %}
{% block title %}Vehicle - SafariConnect{% endblock %}
{% block content %}
<section class="sc-page-header">
  <h1>Add Vehicle</h1>
  <p>Register your vehicle before publishing rides.</p>
</section>
<form method="post" enctype="multipart/form-data" class="card p-4">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn btn-primary">Save vehicle</button>
</form>
{% endblock %}

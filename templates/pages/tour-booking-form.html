{% extends "pages/base_app.html" %}
{% block title %}Tour Booking - SafariConnect{% endblock %}
{% block content %}
<section class="sc-page-header">
  <h1>Book Tour: {{ tour.title }}</h1>
  <p>Complete your details and secure your itinerary in seconds.</p>
</section>
<form method="post" class="card p-4">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn btn-primary">Confirm booking</button>
</form>
{% endblock %}

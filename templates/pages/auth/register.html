{% extends "pages/base_app.html" %}
{% block title %}Register - SafariConnect{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-6 col-lg-7">
    <section class="sc-page-header text-center mb-3">
      <h1>Create Your Account</h1>
      <p>Join SafariConnect to book tours, find rides, or offer seats as a verified driver.</p>
    </section>
    <form method="post" class="sc-card p-4 p-md-5">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary w-100 mb-2">Register</button>
      <p class="text-muted mt-2 mb-0 text-center">Already have an account? <a href="{% url 'login' %}">Login</a></p>
    </form>
  </div>
</div>
{% endblock %}
